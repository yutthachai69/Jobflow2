# Docker Image = แพ็กเกจพร้อมรัน | Container = ตัวที่รันจริงจาก image
# compose build → ได้ image (เช่น jobflow:latest) | compose up → รัน containers
# รายละเอียด: DOCKER.md
services:
  # ส่วนของ Database (local dev เท่านั้น — production ใช้ Supabase)
  db:
    image: postgres:15-alpine
    container_name: jobflow21-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobflow_test
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # ส่วนของเว็บ (Next.js) — production ใช้ Supabase ผ่าน .env.server บน server
  web:
    image: aomx555/tml:latest
    container_name: jobflow-app
    ports:
      - "3000:3000"
    env_file:
      - .env.server
    restart: always

volumes:
  pgdata:
